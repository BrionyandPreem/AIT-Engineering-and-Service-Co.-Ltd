<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Sarabun:wght@200;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-gray-50 p-8">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-semibold text-center mb-10 text-gray-800">Measurement and Instrumentation</h1>

        <div class="flex flex-col md:flex-row gap-4 mb-8 bg-white p-6 shadow-sm rounded-lg">
            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 mb-1">Search Product</label>
                <input type="text" id="searchInput" onkeyup="filterProducts()" 
                    placeholder="พิมพ์ชื่อสินค้าเพื่อค้นหา..." 
                    class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="w-full md:w-64">
                <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                <select id="categoryFilter" onchange="filterProducts()" 
                    class="w-full border border-gray-300 rounded-md px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="all">All Categories</option>
                    <option value="actuator">Actuator</option>
                    <option value="analyzer">Analyzer</option>
                    <option value="flow">Flow</option>
                </select>
            </div>
        </div>

        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="product-card bg-white p-4 rounded-lg shadow-sm border border-transparent hover:border-blue-500 transition" data-name="114C Thermowell" data-category="actuator">
                <div class="aspect-square bg-gray-50 mb-4 flex items-center justify-center p-4">
                    <img src="https://via.placeholder.com/150" alt="Product" class="max-h-full">
                </div>
                <h3 class="font-semibold text-gray-800 mb-4 h-12">114C Thermowell</h3>
                <button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">Read more</button>
            </div>

            <div class="product-card bg-white p-4 rounded-lg shadow-sm border border-transparent hover:border-blue-500 transition" data-name="1700 and 2700" data-category="flow">
                <div class="aspect-square bg-gray-50 mb-4 flex items-center justify-center p-4">
                    <img src="https://via.placeholder.com/150" alt="Product" class="max-h-full">
                </div>
                <h3 class="font-semibold text-gray-800 mb-4 h-12">1700 and 2700</h3>
                <button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">Read more</button>
            </div>

            <div class="product-card bg-white p-4 rounded-lg shadow-sm border border-transparent hover:border-blue-500 transition" data-name="2051C Series" data-category="actuator">
                <div class="aspect-square bg-gray-50 mb-4 flex items-center justify-center p-4">
                    <img src="https://via.placeholder.com/150" alt="Product" class="max-h-full">
                </div>
                <h3 class="font-semibold text-gray-800 mb-4 h-12">2051C Series</h3>
                <button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">Read more</button>
            </div>

        </div>

        <div id="noResults" class="hidden text-center py-20 text-gray-500">
            ไม่พบสินค้าที่ตรงกับเงื่อนไขของคุณ
        </div>
    </div>

    <script>
        function filterProducts() {
            // 1. ดึงค่าจากช่อง Search และ Dropdown
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const categoryValue = document.getElementById('categoryFilter').value;
            
            // 2. ดึงการ์ดสินค้าทั้งหมดออกมา
            const products = document.querySelectorAll('.product-card');
            let hasResults = false;

            products.forEach(product => {
                const name = product.getAttribute('data-name').toLowerCase();
                const category = product.getAttribute('data-category');

                // 3. ตรวจสอบเงื่อนไข: ชื่อต้องตรง(บางส่วน) และ หมวดหมู่ต้องตรง(หรือเลือก All)
                const nameMatch = name.includes(searchText);
                const categoryMatch = (categoryValue === 'all' || category === categoryValue);

                if (nameMatch && categoryMatch) {
                    product.classList.remove('hidden');
                    hasResults = true;
                } else {
                    product.classList.add('hidden');
                }
            });

            // 4. แสดงข้อความเมื่อไม่พบสินค้า
            const noResultsDiv = document.getElementById('noResults');
            if (hasResults) {
                noResultsDiv.classList.add('hidden');
            } else {
                noResultsDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
